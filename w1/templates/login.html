{% block title %}Login{% endblock %}

{% block content %}
<div class="card">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
