{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 style="color: #FF00FF;">Class Performance Analytics</h2>
    <p style="color: #00FFFF;">Visualizing the correlation between attendance and final scores.</p>
    
    <div class="chart-container" style="margin-top: 30px; box-shadow: 0px 0px 20px rgba(138, 43, 226, 0.4); border-radius: 10px; display: inline-block; padding: 15px; background-color: #121212;">
        <img src="data:image/png;base64, {{ plot_url }}" alt="Performance Graph" style="max-width: 100%; height: auto; border-radius: 8px;">
    </div>
    
    <br>
    <a href="{{ url_for('views.dashboard') }}" class="btn mt-4" style="background-color: #8A2BE2; color: white;">Back to Dashboard</a>
</div>
{% endblock %}
