<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login | Mark Analysis System</title>
    <style>
        /* CSS STYLES FOR LOGIN PAGE */
        :root {
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --text-dark: #1f2937;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .login-container {
            background: var(--white);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-header h2 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box; /* Fixes padding issues */
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            color: red;
            background: #fee2e2;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Faculty Portal</h2>
            <p>Enter your credentials to manage marks</p>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}
        </div>
        
    
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="admin@uni.edu" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>

</body>
</html>
